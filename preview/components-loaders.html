<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
@keyframes spin-nl { to { transform: rotate(360deg) } }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
.spin { border-radius:9999px; border:3px solid #c6c7c2; border-top-color:#5869f7; animation:spin-nl 0.7s linear infinite }
.sk   { height:12px; background:linear-gradient(90deg,#dbdcd7 25%,#efefef 50%,#dbdcd7 75%); background-size:200% 100%; animation: shimmer 1.4s ease-in-out infinite; border-radius:6px }
</style></head><body>
<div class="card">
  <div class="eyebrow">Loaders · spinner &amp; skeleton</div>
  <div style="display:flex;gap:28px;align-items:center">
    <div class="spin" style="width:16px;height:16px;border-width:2px"></div>
    <div class="spin" style="width:24px;height:24px;border-width:2.5px"></div>
    <div class="spin" style="width:40px;height:40px"></div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div class="sk" style="width:70%"></div>
      <div class="sk" style="width:90%"></div>
      <div class="sk" style="width:55%"></div>
    </div>
  </div>
</div>
</body></html>
