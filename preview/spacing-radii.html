<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display:flex; align-items:center; gap:32px; flex-wrap:wrap }
.shape { background:#fff; border:1px solid #e8e8e8; padding:14px 18px; font-family:var(--nl-font-body); font-size:13px; color:#141414 }
.lbl { font-family:var(--nl-font-mono); font-size:10.5px; color:#71717a; margin-top:8px; display:block; text-align:center }
</style></head><body>
<div class="card">
  <div class="eyebrow">Radii · 10 / 14 / 20 / 9999</div>
  <div class="row" style="justify-content:space-around">
    <div><div class="shape" style="border-radius:10px;height:56px;width:100px;display:flex;align-items:center;justify-content:center">input</div><span class="lbl">10 · input</span></div>
    <div><div class="shape" style="border-radius:14px;height:56px;width:100px;display:flex;align-items:center;justify-content:center">alert</div><span class="lbl">14 · alert</span></div>
    <div><div class="shape" style="border-radius:20px;height:56px;width:100px;display:flex;align-items:center;justify-content:center">card</div><span class="lbl">20 · card</span></div>
    <div><div class="shape" style="border-radius:9999px;height:40px;padding:0 20px;display:inline-flex;align-items:center">pill</div><span class="lbl">9999 · pill</span></div>
  </div>
</div>
</body></html>
