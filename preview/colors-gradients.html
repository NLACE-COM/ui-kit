<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.g { height: 120px; border-radius: 14px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; color: #fff; }
.g .name { font-family: var(--nl-font-body); font-weight: 600; font-size: 12px; }
.g .meta { font-family: var(--nl-font-mono); font-size: 10px; opacity: 0.85; }
</style></head><body>
<div class="card">
  <div class="eyebrow">Gradients · restrained, brand-aligned</div>
  <div class="grid">
    <div class="g" style="background:linear-gradient(135deg,#0f1011 0%,#2b2f4d 60%,#3a3f6b 100%)"><span class="name">nl-hero</span><span class="meta">black → dusk blue</span></div>
    <div class="g" style="background:linear-gradient(135deg,#3b4dd8 0%,#5869f7 100%)"><span class="name">nl-primary</span><span class="meta">blue, soft depth</span></div>
    <div class="g" style="background:linear-gradient(135deg,#fc624b 0%,#e24a75 100%)"><span class="name">nl-accent</span><span class="meta">accent → rose</span></div>
    <div class="g" style="background:linear-gradient(135deg,#dbdcd7 0%,#ffffff 100%);color:#0f1011"><span class="name">nl-surface</span><span class="meta">surface → white</span></div>
    <div class="g" style="background:linear-gradient(180deg,#0f1011 0%,#3f3f46 100%)"><span class="name">nl-dark</span><span class="meta">black → graphite</span></div>
    <div class="g" style="background:linear-gradient(90deg,#5869f7 0%,#fc624b 100%)"><span class="name">nl-brand</span><span class="meta">text gradient only</span></div>
  </div>
</div>
</body></html>
