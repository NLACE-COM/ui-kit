<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.alerts { display:flex; flex-direction:column; gap:10px }
.alert {
  display:grid; grid-template-columns: 56px 1fr auto; align-items:stretch;
  font-family:var(--nl-font-body);
  border-radius: 20px;
  background:#fff;
  overflow:hidden;
  box-shadow: 0 2px 12px rgba(15,16,17,0.06);
}
.alert .sigil {
  background: var(--bar);
  color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-family: var(--nl-font-display);
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.03em;
  position: relative;
}
.alert .sigil::after {
  content:''; position:absolute; top:10px; right:0; width:2px; height:calc(100% - 20px);
  background: rgba(255,255,255,0.25); border-radius: 2px;
}
.alert .body { padding: 12px 16px; display:flex; flex-direction:column; justify-content:center; }
.alert .title { font-size:13.5px; font-weight:600; color:#0f1011; margin:0;
  font-family: var(--nl-font-display); letter-spacing:-0.018em;
  display:flex; align-items:center; gap:8px;
}
.alert .title .kind {
  font-family: var(--nl-font-mono); font-size:10px; font-weight:500;
  letter-spacing: 0.12em; text-transform:uppercase;
  color: var(--bar); background: var(--bar-tint);
  padding: 2px 8px; border-radius: 9999px;
}
.alert .desc { font-size:13px; color:#3f3f46; margin:3px 0 0 }
.alert .tail { padding: 12px 16px; display:flex; align-items:center; gap:10px; color:#71717a; font-size:12px }
.alert .tail button {
  background:transparent; border:0; font-family: var(--nl-font-body);
  font-weight:600; font-size:12.5px; color: var(--bar); cursor:pointer;
  padding: 6px 10px; border-radius: 9999px;
}
.alert .tail button:hover { background: var(--bar-tint); }

.a-info    { --bar:#5869f7; --bar-tint: rgba(88,105,247,0.12) }
.a-success { --bar:#2ba36a; --bar-tint: rgba(66,207,138,0.18) }
.a-warn    { --bar:#b717af; --bar-tint: rgba(183,23,175,0.12) }
.a-error   { --bar:#fc624b; --bar-tint: rgba(252,98,75,0.12) }
</style></head><body>
<div class="card">
  <div class="eyebrow">Alerts · sigil + tagged type</div>
  <div class="alerts">
    <div class="alert a-info">
      <div class="sigil">i</div>
      <div class="body">
        <p class="title">Aviso <span class="kind">info</span></p>
        <p class="desc">El proceso tardará unos minutos.</p>
      </div>
      <div class="tail"><button>Ver detalle</button></div>
    </div>
    <div class="alert a-success">
      <div class="sigil">✓</div>
      <div class="body">
        <p class="title">Listo <span class="kind">success</span></p>
        <p class="desc">Cambios guardados correctamente.</p>
      </div>
      <div class="tail"><button>Deshacer</button></div>
    </div>
    <div class="alert a-warn">
      <div class="sigil">!</div>
      <div class="body">
        <p class="title">Atención <span class="kind">warning</span></p>
        <p class="desc">Revisa los datos antes de continuar.</p>
      </div>
      <div class="tail"><button>Revisar</button></div>
    </div>
    <div class="alert a-error">
      <div class="sigil">✕</div>
      <div class="body">
        <p class="title">Error <span class="kind">error</span></p>
        <p class="desc">No se pudo conectar al servidor.</p>
      </div>
      <div class="tail"><button>Reintentar</button></div>
    </div>
  </div>
</div>
</body></html>
