<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.field { display:flex;flex-direction:column;gap:6px }
.label { font-size:13px; font-weight:600; color:#0f1011 }
.input { min-height:44px; padding:0 14px; border-radius:10px; border:1.5px solid #c6c7c2; background:#fff; font-family:var(--nl-font-body); font-size:14.4px; color:#0f1011; outline:none; }
.input.error { border-color:#fc624b }
.input.focus { border-color:#5869f7; box-shadow:0 0 0 4px rgba(88,105,247,0.2) }
.hint { font-size:12.5px; color:#71717a }
.err  { font-size:12.5px; color:#fc624b }
</style></head><body>
<div class="card">
  <div class="eyebrow">Inputs · rest / focus / error</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="field">
      <div class="label">Email</div>
      <input class="input" placeholder="tu@ejemplo.com"/>
      <div class="hint">Como aparece en tu perfil</div>
    </div>
    <div class="field">
      <div class="label">Nombre</div>
      <input class="input focus" value="Valeria Díaz"/>
      <div class="hint">Foco · ring primary/20</div>
    </div>
    <div class="field" style="grid-column:1 / -1">
      <div class="label">RUT</div>
      <input class="input error" value="12.345.678"/>
      <div class="err">Formato inválido</div>
    </div>
  </div>
</div>
</body></html>
