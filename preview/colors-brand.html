<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.sw { border-radius: 12px; padding: 14px; height: 84px; display: flex; flex-direction: column; justify-content: space-between; border:1px solid transparent; }
.sw .name { font-family: var(--nl-font-body); font-weight: 600; font-size: 12px; }
.sw .hex { font-family: var(--nl-font-mono); font-size: 10.5px; opacity: 0.78; }
</style></head><body>
<div class="card">
  <div class="eyebrow">Brand · canonical palette</div>
  <div class="swatches">
    <div class="sw" style="background:#0f1011;color:#fff"><span class="name">nl-black</span><span class="hex">#0F1011</span></div>
    <div class="sw" style="background:#ffffff;color:#0f1011;border-color:#dbdcd7"><span class="name">nl-white</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background:#5869f7;color:#fff"><span class="name">nl-primary</span><span class="hex">#5869F7</span></div>
    <div class="sw" style="background:#fc624b;color:#fff"><span class="name">nl-accent</span><span class="hex">#FC624B</span></div>
    <div class="sw" style="background:#f76dee;color:#fff"><span class="name">nl-pink</span><span class="hex">#F76DEE</span></div>
    <div class="sw" style="background:#b717af;color:#fff"><span class="name">nl-magenta</span><span class="hex">#B717AF</span></div>
    <div class="sw" style="background:#42cf8a;color:#053a23"><span class="name">nl-success</span><span class="hex">#42CF8A</span></div>
    <div class="sw" style="background:#dbdcd7;color:#0f1011"><span class="name">nl-surface</span><span class="hex">#DBDCD7</span></div>
  </div>
</div>
</body></html>
