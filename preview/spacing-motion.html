<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
@keyframes fade-up { 0%{opacity:0; transform:translateY(12px)} 100%{opacity:1; transform:none} }
@keyframes pulse-ring { 0%{transform:scale(1); opacity:0.35} 100%{transform:scale(2.2); opacity:0} }
.tile { height:90px; border-radius:14px; border:1px solid #e8e8e8; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; font-family:var(--nl-font-body); font-size:12px; color:#3f3f46 }
.dot { width:20px; height:20px; border-radius:9999px; background:#3f58ea; position:relative }
.dot::after { content:''; position:absolute; inset:0; border-radius:9999px; background:#3f58ea; animation: pulse-ring 1.6s ease infinite }
.fade { animation: fade-up 0.48s cubic-bezier(0.22,1,0.36,1) infinite alternate }
.curve { font-family:var(--nl-font-mono); font-size:10px; color:#71717a }
</style></head><body>
<div class="card">
  <div class="eyebrow">Motion · durations &amp; easing</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div class="tile"><div class="fade" style="width:16px;height:16px;border-radius:4px;background:#ff6143"></div><span>fade-up · 480ms</span></div>
    <div class="tile"><div class="dot"></div><span>pulse-ring · 1600ms</span></div>
    <div class="tile"><span class="curve">cubic-bezier(0.22, 1, 0.36, 1)</span><span>ease-nl · quart-out</span></div>
  </div>
  <div class="mono-label">--nl-dur-ui 220ms · --nl-dur-reveal 480ms</div>
</div>
</body></html>
