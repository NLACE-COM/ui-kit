<!DOCTYPE html>
<!-- @dsCard group="Components" name="Table" subtitle="Tabla de datos · header en caps · hover de fila · celdas con badge" viewport="700x320" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.tbl-wrap { border:1px solid var(--nl-border-soft); border-radius:20px; overflow:hidden; background:#fff; }
table { width:100%; border-collapse:collapse; font-size:14px; }
th { text-align:left; padding:14px 20px; font-size:11.5px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--nl-500); border-bottom:1px solid var(--nl-border-soft); }
td { padding:14px 20px; color:var(--nl-700); border-bottom:1px solid var(--nl-border-soft); }
tr:last-child td { border-bottom:0; }
tr.hot td { background:rgba(88,105,247,.05); }
.r { text-align:right; }
.name { font-weight:600; color:var(--nl-text); }
.badge { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:9999px; font-size:11.5px; font-weight:600; }
.b-ok { background:rgba(66,207,138,.2); color:var(--nl-success-text); }
.b-pend { background:rgba(161,161,170,.18); color:var(--nl-700); }
.b-pri { background:rgba(88,105,247,.12); color:var(--nl-primary); }
</style></head><body>
<div class="card">
  <div class="eyebrow">Table · cuentas</div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Empresa</th><th>Plan</th><th class="r">MRR</th><th>Estado</th></tr></thead>
      <tbody>
        <tr class="hot"><td class="name">Acme Logística</td><td><span class="badge b-pri">Scale</span></td><td class="r">$4.200</td><td><span class="badge b-ok">Activo</span></td></tr>
        <tr><td class="name">Norte Retail</td><td><span class="badge b-pri">Growth</span></td><td class="r">$2.850</td><td><span class="badge b-ok">Activo</span></td></tr>
        <tr><td class="name">Delta Salud</td><td><span class="badge b-pend">Starter</span></td><td class="r">$990</td><td><span class="badge b-pend">Prueba</span></td></tr>
        <tr><td class="name">Vega Fintech</td><td><span class="badge b-pri">Scale</span></td><td class="r">$5.400</td><td><span class="badge b-ok">Activo</span></td></tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
