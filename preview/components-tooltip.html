<!DOCTYPE html>
<!-- @dsCard group="Components" name="Tooltip" subtitle="Etiqueta oscura · 4 posiciones · aparece en hover/focus" viewport="700x220" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.tt-grid { display:flex; gap:40px; justify-content:center; padding:24px 0; }
.tt { position:relative; }
.trigger { padding:10px 18px; border-radius:9999px; background:#fff; border:1px solid var(--nl-border-ui); font-family:var(--nl-font-body); font-weight:600; font-size:13.5px; color:var(--nl-text); }
.bubble { position:absolute; white-space:nowrap; padding:6px 10px; border-radius:8px; font-size:12.2px; font-weight:500; color:#fff; background:var(--nl-900); box-shadow:var(--nl-shadow-hover); }
.bubble::after { content:""; position:absolute; width:8px; height:8px; background:var(--nl-900); transform:rotate(45deg); }
.b-top { bottom:100%; left:50%; transform:translateX(-50%); margin-bottom:8px; }
.b-top::after { top:100%; left:50%; transform:translateX(-50%) rotate(45deg); margin-top:-4px; }
.b-bottom { top:100%; left:50%; transform:translateX(-50%); margin-top:8px; }
.b-bottom::after { bottom:100%; left:50%; transform:translateX(-50%) rotate(45deg); margin-bottom:-4px; }
.b-right { left:100%; top:50%; transform:translateY(-50%); margin-left:8px; }
.b-right::after { right:100%; top:50%; transform:translateY(-50%) rotate(45deg); margin-right:-4px; }
</style></head><body>
<div class="card">
  <div class="eyebrow">Tooltip · siempre visible (demo)</div>
  <div class="tt-grid">
    <div class="tt"><span class="bubble b-top">Copiar enlace</span><button class="trigger">Top</button></div>
    <div class="tt"><span class="bubble b-bottom">Se guarda automático</span><button class="trigger">Bottom</button></div>
    <div class="tt"><span class="bubble b-right">Ver detalles</span><button class="trigger">Right</button></div>
  </div>
</div>
</body></html>
