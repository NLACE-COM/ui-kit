<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.sw { border-radius: 12px; padding: 14px; height: 84px; display: flex; flex-direction: column; justify-content: space-between; border:1px solid var(--nl-border-soft); }
.sw .name { font-family: var(--nl-font-body); font-weight: 600; font-size: 12px; }
.sw .hex { font-family: var(--nl-font-mono); font-size: 10.5px; opacity: 0.75; }
</style></head><body>
<div class="card">
  <div class="eyebrow">Neutrals · zinc scale + surfaces</div>
  <div class="swatches">
    <div class="sw" style="background:#0f1011;color:#fff;border-color:transparent"><span class="name">nl-900</span><span class="hex">#0F1011</span></div>
    <div class="sw" style="background:#3f3f46;color:#fff;border-color:transparent"><span class="name">nl-700</span><span class="hex">#3F3F46</span></div>
    <div class="sw" style="background:#71717a;color:#fff;border-color:transparent"><span class="name">nl-500</span><span class="hex">#71717A</span></div>
    <div class="sw" style="background:#a1a1aa;color:#fff;border-color:transparent"><span class="name">nl-400</span><span class="hex">#A1A1AA</span></div>
    <div class="sw" style="background:#c6c7c2;color:#0f1011"><span class="name">border-ui</span><span class="hex">#C6C7C2</span></div>
    <div class="sw" style="background:#dbdcd7;color:#0f1011"><span class="name">border-soft</span><span class="hex">#DBDCD7</span></div>
    <div class="sw" style="background:#efefef;color:#0f1011"><span class="name">nl-bg</span><span class="hex">#EFEFEF</span></div>
    <div class="sw" style="background:#ffffff;color:#0f1011"><span class="name">nl-white</span><span class="hex">#FFFFFF</span></div>
  </div>
</div>
</body></html>
