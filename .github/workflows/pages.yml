name: Deploy showcase to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'dist/**'
      - 'showcase/**'
      - 'scripts/build-showcase.mjs'
      - 'docs/index.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build design system + showcase
        run: |
          npm run build
          node .design-sync/build-utilities-css.mjs
          npm run showcase
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
