<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>NLACE AI Studio · UI Kit</title>
  <meta name="viewport" content="width=1360"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [route, setRoute] = useState("home");
      const [search, setSearch] = useState("");

      // Re-render Lucide icons after each render.
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });

      const nav = (id) => {
        if (id === "projects") setRoute("projects");
        else if (id === "home") setRoute("home");
        else setRoute(id);
      };

      return (
        <div className="shell" data-screen-label="NLACE AI Studio">
          <Sidebar active={route === "chat" ? "projects" : route}
                   onNav={nav}
                   projectCount={sampleProjects.length}/>
          <div className="main">
            <Topbar search={search} setSearch={setSearch} onNew={() => setRoute("chat")}/>
            <div className="content">
              {route === "home"     && <HomeScreen goProjects={() => setRoute("projects")} startProject={() => setRoute("chat")}/>}
              {route === "projects" && <ProjectsScreen filter={search} setFilter={setSearch}/>}
              {route === "chat"     && <ChatScreen onBack={() => setRoute("home")}/>}
              {["models","assets","data","team","billing","settings"].includes(route) && (
                <div style={{ padding: 60, textAlign: "center", color: "var(--nl-500)" }}>
                  <h2 className="display" style={{ fontSize: 28, color: "var(--nl-text)" }}>{route}</h2>
                  <p>Pantalla placeholder · pertenece al UI kit pero aún no implementada.</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
