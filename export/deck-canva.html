            writer.write(bytes);
            writer.close();

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);

    // would push the parser into quirks mode. DOMParser always emits a <head>

cing:0.16em;text-transform:uppercase;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.25);}\n/* persona color themes — NO gray text on colored bg */\n.pc-blue{background:#5869f7;color:#fff;} .pc-blue .persona-role{color:#fff;} .pc-blue .persona-quote{color:rgba(255,255,255,0.88);} .pc-blue .persona-gain{color:rgba(255,255,255,0.7);}\n.pc-red {background:#fc624b;color:#fff;} .pc-red .persona-role{color:#fff;} .pc-red  .persona-quote{color:rgba(255,255,255,0.88);} .pc-red .persona-gain{color:rgba(255,255,255,0.7);}\n.pc-grn {background:#42cf8a;color:#0f1011;} .pc-grn .persona-role{color:#0f1011;} .pc-grn .persona-quote{color:rgba(15,16,17,0.82);} .pc-grn .persona-gain{color:rgba(15,16,17,0.6);border-top-color:rgba(15,16,17,0.2);}\n\n/* ══════════════════════════════════════════════════\n   S7 · CIERRE — left CTA, right abstract tech photo\n══════════════════════════════════════════════════ */\n#s7{grid-template-columns:1fr 1fr;}\n.s7l{background:#fff;padding:100px 80px 100px;display:flex;flex-direction:column;justify-content:space-between;}\n.s7r{position:relative;overflow:hidden;background:#0f1011;}\n.s7r-photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.55;mix-blend-mode:luminosity;}\n.s7r .ov{position:absolute;inset:0;background:linear-gradient(to left, rgba(88,105,247,0.55) 0%, rgba(15,16,17,0.2) 100%);}\n.s7r .ds-preview{\n  position:absolute;inset:0;z-index:2;\n  display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr);gap:16px;\n  padding:60px;pointer-events:none;\n}\n.ds-chip{border-radius:16px;padding:20px 24px;display:flex;flex-direction:column;justify-content:space-between;background:rgba(255,255,255,0.12);backdrop-filter:blur(6px);}\n.ds-chip .dc-l{font-family:ui-monospace,\"Courier New\",monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.7);}\n.ds-chip .dc-v{font-family:system-ui,-apple-system,sans-serif;font-weight:700;f apple-system,sans-serif;font-weight:800;font-size:20px;color:#fff;flex-shrink:0;}\n.alert-ds .al-body{padding:16px 20px;flex:1;}\n.alert-ds .al-title{font-family:system-ui,-apple-system,sans-serif;font-weight:600;font-size:17px;letter-spacing:-0.01em;margin:0 0 4px;}\n.alert-ds .al-desc{font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.45;margin:0;color:#3f3f46;}\n\n/* ══════════════════════════════════════════════════\n   S12 · CARDS & SOMBRAS\n══════════════════════════════════════════════════ */\n#s12{grid-template-columns:0.9fr 1.1fr;}\n.s12l{background:#efefef;padding:100px 72px;display:flex;flex-direction:column;justify-content:center;gap:24px;}\n.s12r{background:#efefef;padding:100px 72px;border-left:1px solid #c6c7c2;display:flex;flex-direction:column;justify-content:center;gap:24px;}\n.card-ds{background:#fff;border:1px solid #dbdcd7;border-radius:20px;padding:28px;box-shadow:0 2px 12px rgba(15,16,17,0.08);}\n.card-ds.hover-state{box-shadow:0 10px 28px rgba(15,16,17,0.14);transform:translateY(-4px);}\n.card-ds.accent-state{background:#5869f7;border-color:transparent;box-shadow:none;}\n.card-ds .cd-tag{font-family:ui-monospace,\"Courier New\",monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#a1a1aa;margin-bottom:12px;}\n.card-ds.accent-state .cd-tag{color:rgba(255,255,255,0.6);}\n.card-ds .cd-t{font-family:system-ui,-apple-system,sans-serif;font-weight:600;font-size:24px;letter-spacing:-0.015em;color:#0f1011;margin:0 0 8px;}\n.card-ds.accent-state .cd-t{color:#fff;}\n.card-ds .cd-d{font-family:system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.5;color:#71717a;}\n.card-ds.accent-state .cd-d{color:rgba(255,255,255,0.8);}\n.shadow-row{display:flex;flex-direction:column;gap:20px;}\n.shadow-item{display:flex;align-items:center;gap:24px;}\n.shadow-box{width:120px;height:80px;border-radius:16px;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:ui-monos ly:system-ui,-apple-system,sans-serif;font-size:14px;color:rgba(255,255,255,0.78);}\n\n/* ══════════════════════════════════════════════════\n   S17 · ARQUITECTURA DEL SISTEMA\n══════════════════════════════════════════════════ */\n#s17{grid-template-columns:1fr 1fr;}\n.s17l{background:#fff;padding:100px 80px;display:flex;flex-direction:column;justify-content:center;gap:0;}\n.s17r{background:#0f1011;padding:100px 80px;display:flex;flex-direction:column;justify-content:center;gap:24px;}\n.arch-row{display:flex;align-items:stretch;gap:0;margin-bottom:0;}\n.arch-layer{border-radius:16px;padding:24px 28px;display:flex;align-items:center;gap:20px;margin-bottom:12px;}\n.arch-layer .al-icon{width:48px;height:48px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;font-weight:800;font-size:22px;color:#fff;}\n.arch-layer .al-t{font-family:system-ui,-apple-system,sans-serif;font-weight:600;font-size:22px;letter-spacing:-0.015em;margin:0 0 4px;}\n.arch-layer .al-d{font-family:system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.4;}\n.arch-layer.l1{background:#5869f7;color:#fff;} .arch-layer.l1 .al-d{color:rgba(255,255,255,0.8);}\n.arch-layer.l2{background:#fc624b;color:#fff;} .arch-layer.l2 .al-d{color:rgba(255,255,255,0.8);}\n.arch-layer.l3{background:#42cf8a;color:#0f1011;} .arch-layer.l3 .al-d{color:rgba(15,16,17,0.7);}\n.arch-layer.l4{background:#f76dee;color:#fff;} .arch-layer.l4 .al-d{color:rgba(255,255,255,0.8);}\n.arch-arrow{text-align:center;font-size:28px;color:#dbdcd7;margin:0 0 8px;}\n.file-tree{display:flex;flex-direction:column;gap:8px;}\n.ft-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;}\n.ft-item.dir{background:rgba(255,255,255,0.08);}\n.ft-item .ft-icon{font-family:ui-monospace,\"Courier New\",monospace;font-size:14px;color:#5869f7;width:20px;flex-shrink:0;}\n.ft-item .ft-name{font-family:ui-monospace,\"Courier New\",monospace;font-size:15px;color:#fff;}\n.ft-item .ft-desc{font-family:system-ui,-apple-system,sans-serif;font-size:13px;color:rgba(255,255,255,0.5);margin-left:auto;}\n.ft-indent{padding-left:40px;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<script type=\"application/json\" id=\"speaker-notes\">[]<\u002Fscript>\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- ──────────────────────────────────────────────────\n     S1 · PORTADA\n────────────────────────────────────────────────── -->\n<section id=\"s1\" data-label=\"01 Portada\">\n  <div class=\"s1l\">\n    <div style=\"font-family:system-ui;font-weight:800;font-size:32px;letter-spacing:-0.04em;color:#0f1011;\">nlace.<\u002Fdiv>\n    <div>\n      <div class=\"eyebrow dk\" style=\"margin-bottom:28px;\">Design System 101 · NLACE · 2026<\u002Fdiv>\n      <h1 class=\"s1-h\">Por qué usar<br>un <span class=\"grad\">sistema<br>de diseño<\u002Fspan>.<\u002Fh1>\n      <p class=\"s1-sub\">Una presentación para el equipo: qué es, qué resuelve, y por qué cambia la forma en que construimos.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mono\" style=\"font-size:14px;letter-spacing:0.16em;text-transform:uppercase;color:#a1a1aa;\">01 / 17<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"s1r\" style=\"background:#5869f7;\">\n    <div class=\"overlay\"><\u002Fdiv>\n    <div class=\"token-pills\">\n      <div class=\"tp\"><div class=\"tc\" style=\"color:#fff;font-family:system-ui,-apple-system,sans-serif;font-weight:700;font-size:28px;\">Aa<\u002Fdiv><div class=\"tl\">Space Grotesk · Display<\u002Fdiv><\u002Fdiv>\n      <div class=\"tp\">\n        <div style=\"display:flex;gap:8px;\">\n          <div style=\"width:32px;height:32px;border-radius:8px;background:#5869f7;\"><\u002Fdiv>\n          <div style=\"width:32px;height:32px;border-radius:8px;background:#fc624b;\"><\u002Fdiv>\n          <div style=\"width:32px;height:32px;border-radius:8px;background:#f76dee;\"><\u002Fdiv>\n          <div style=\"width:32px;height:32px;border-radius:8px;background:#42cf8a;\"><\u002Fdiv>\n          <div style=\"width:32px;height:32px;border-radius:8px;background:#b717af;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tl\">8 tokens de color<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tp\"><div class=\"tc\">r·20<\u002Fdiv><div class=\"tl\">border-radius · card<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ──────────────────────────────────────────────────\n     S2 · QUÉ ES\n────────────────────────────────────────────────── -->\n<section id=\"s2\" data-label=\"02 Qué es\">\n  <div class=\"s2l\">\n    <div class=\"eyebrow accent\">01 · Definición<\u002Fdiv>\n    <h2 class=\"s2-h\">Un lenguaje <span class=\"grad\">compartido<\u002Fspan> para diseñar y construir.<\u002Fh2>\n    <p class=\"s2-body\">Más que botones: son las <strong>decisiones ya tomadas<\u002Fstrong>. El equipo deja de debatir <em>cuál rojo<\u002Fem> o <em>qué padding<\u002Fem> y se concentra en el problema.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"s2r\">\n    <div class=\"comp-card\">\n      <div class=\"comp-label\">Buttons · variantes<\u002Fdiv>\n      <div class=\"btn-row\">\n        <button class=\"cb p\">Empezar<\u002Fbutton>\n        <button class=\"cb a\">Guardar<\u002Fbutton>\n        <button class=\"cb s\">Cancelar<\u002Fbutton>\n        <button class=\"cb g\">Activo<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"bdg-row\">\n        <span class=\"bdg\" style=\"background:rgba(88,105,247,0.12);color:#3b4dd8\">Nuevo<\u002Fspan>\n        <span class=\"bdg\" style=\"background:rgba(252,98,75,0.12);color:#b7321a\">Beta<\u002Fspan>\n        <span class=\"bdg\" style=\"background:rgba(66,207,138,0.2);color:#053a23\">Activo<\u002Fspan>\n        <span class=\"bdg\" style=\"background:#0f1011;color:#fff\">PRO<\u002Fspan>\n        <span class=\"bdg\" style=\"background:rgba(183,23,175,0.12);color:#8a0d85\">Studio<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"inp foc\"><span>Valeria Díaz<\u002Fspan><span class=\"cur\"><\u002Fspan><\u002Fdiv>\n      <div class=\"inp\"><span class=\"ph\">nombre@empresa.com<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"comp-card\">\n      <div class=\"comp-label\">Tokens · paleta canónica<\u002Fdiv>\n      <div class=\"pal-row\">\n        <div class=\"pal-dot\" style=\"background:#5869f7;\"><\u002Fdiv>\n        <div class=\"pal-dot\" style=\"background:#fc624b;\"><\u002Fdiv>\n        <div class=\"pal-dot\" style=\"background:#f76dee;\"><\u002Fdiv>\n        <div class=\"pal-dot\" style=\"background:#42cf8a;\"><\u002Fdiv>\n        <div class=\"pal-dot\" style=\"background:#b717af;\"><\u002Fdiv>\n        <div class=\"pal-dot\" style=\"background:#0f1011;\"><\u002Fdiv>\n        <div class=\"pal-dot\" style=\"background:#dbdcd7;border:1px solid #c6c7c2;\"><\u002Fdiv>\n        <div class=\"pal-dot\" style=\"background:#ffffff;border:1px solid #c6c7c2;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"comp-card\" style=\"padding:20px;\">\n      <div class=\"comp-label\">Radios<\u002Fdiv>\n      <div style=\"display:flex;gap:12px;align-items:center;\">\n        <div style=\"width:80px;height:40px;border-radius:10px;border:1.5px solid #c6c7c2;\"><\u002Fdiv>\n        <div style=\"width:80px;height:40px;border-radius:20px;border:1.5px solid #c6c7c2;\"><\u002Fdiv>\n        <div style=\"width:80px;height:40px;border-radius:9999px;border:1.5px solid #c6c7c2;\"><\u002Fdiv>\n        <span style=\"font-family:ui-monospace,\" courier=\"\" new\",monospace;font-size:12px;color:#a1a1aa;letter-spacing:0.1em;\"=\"\">10px · 20px · pill<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pg dk\"><span>02 / 17<\u002Fspan><span>NLACE Design<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ──────────────────────────────────────────────────\n     S3 · EL COSTO\n────────────────────────────────────────────────── -->\n<section id=\"s3\" data-label=\"03 El costo\">\n    <div class=\"s3l\" style=\"background:#0f1011;\">\n    <div class=\"ov\" style=\"display:none\"><\u002Fdiv>\n    <div class=\"copy\">\n      <div class=\"s3-eyebrow\">02 · El costo de no tenerlo<\u002Fdiv>\n      <h2 class=\"s3-h\">Lo mismo,<br><span class=\"grad\">inventado<br>muchas veces<\u002Fspan>.<\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"s3r\">\n    <div style=\"margin-bottom:20px;\">\n      <div class=\"eyebrow dk\" style=\"margin-bottom:8px;\">Sin sistema de diseño<\u002Fdiv>\n      <div style=\"font-family:system-ui,-apple-system,sans-serif;font-size:22px;line-height:1.45;color:#3f3f46;max-width:760px;\">Cada equipo reinventa los mismos componentes. El resultado: inconsistencia, lentitud y deuda técnica.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-block sb-1\">\n      <div class=\"stat-n\">34%<\u002Fdiv>\n      <p class=\"stat-desc\">del tiempo front-end se va en reconstruir componentes que ya existen en otro producto.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"stat-block sb-2\">\n      <div class=\"stat-n\">12<\u002Fdiv>\n      <p class=\"stat-desc\">tonos de azul distintos entre Agrointegral, Evo y el cotizador.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"stat-block sb-3\">\n      <div class=\"stat-n\">3×<\u002Fdiv>\n      <p class=\"stat-desc\">más tickets de accesibilidad cuando se replica un formulario sin base común.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"pg dk\" style=\"left:50%;\"><span>03 / 17<\u002Fspan><span>NLACE Design<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ──────────────────────────────────────────────────\n     S4 · VENTAJAS BENTO\n────────────────────────────────────────────────── -->\n<section id=\"s4\" data-label=\"04 Ventajas\">\n  <div class=\"s4-bar\">\n    <div style=\"display:flex;align-items:center;gap:32px;\">\n      <div style=\"font-family:system-ui;font-weight:800;font-size:26px;letter-spacing:-0.04em;color:#0f1011;\">nlace.<\u002Fdiv>\n      <span class=\"s4-title\">Cinco ventajas concretas.<\u002Fspan>\n    <\u002Fdiv>\n    <spa
