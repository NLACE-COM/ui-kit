<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NLACE Design System — Showcase</title>
  <meta name="description" content="Showcase del NLACE Design System: tokens, 21 componentes React reales, gráficos y un ejemplo aplicado. Listo para usar con agentes de IA." />
  <meta property="og:title" content="NLACE Design System" />
  <meta property="og:description" content="Tokens, 21 componentes React y un dashboard aplicado — todo con el código real del paquete @nlace/ui-kit." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 625 625'%3E%3Crect width='625' height='625' rx='140' fill='%235869f7'/%3E%3Ctext x='50%25' y='58%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='360' font-family='sans-serif' font-weight='800'%3En.%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./assets/nlace.css" />
  <style>
    :root { --sc-max: 1120px; --sc-nav-w: 232px; }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 84px; }
    body { margin: 0; background: var(--nl-bg); color: var(--nl-text); }
    a { color: var(--nl-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code, .sc-mono { font-family: var(--nl-font-mono); }

    /* Topbar flotante (estilo nlace.com) */
    .sc-topbar {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      width: min(95%, 1380px); z-index: 100;
      display: flex; align-items: center; gap: 6px;
      padding: 9px 9px 9px 22px;
      background: rgba(244,244,240,.72);
      -webkit-backdrop-filter: saturate(160%) blur(14px);
      backdrop-filter: saturate(160%) blur(14px);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 16px;
      box-shadow: 0 12px 36px rgba(15,16,30,.16);
    }
    .sc-topbar .sc-spacer { flex: 1; }
    .sc-topbar a.sc-link {
      font: 600 .9rem/1 var(--nl-font-body); color: var(--fg-2);
      padding: 8px 12px; border-radius: 9999px;
      transition: color var(--nl-dur-ui) var(--nl-ease);
    }
    .sc-topbar a.sc-link:hover { text-decoration: none; color: var(--nl-text); }
    .sc-cta-pill {
      font: 700 .88rem/1 var(--nl-font-body); color: #fff;
      background: var(--nl-grad-warm);
      padding: 12px 20px; border-radius: 9999px; border: 0; cursor: pointer;
      box-shadow: 0 6px 18px rgba(252,98,75,.4);
      transition: transform var(--nl-dur-ui) var(--nl-ease);
    }
    .sc-cta-pill:hover { text-decoration: none; transform: translateY(-1px); color: #fff; }

    /* Layout */
    .sc-shell { display: grid; grid-template-columns: var(--sc-nav-w) 1fr; gap: 40px; max-width: var(--sc-max); margin: 0 auto; padding: 0 24px; }
    .sc-nav { position: sticky; top: 84px; align-self: start; height: max-content; padding: 28px 0; }
    .sc-nav h6 { margin: 18px 0 8px; font: 600 .68rem/1 var(--nl-font-body); letter-spacing: var(--nl-tracking-ui); text-transform: uppercase; color: var(--fg-4); }
    .sc-nav a { display: block; padding: 6px 12px; border-radius: 8px; font: 500 .9rem/1.3 var(--nl-font-body); color: var(--fg-2); }
    .sc-nav a:hover { background: var(--nl-white); text-decoration: none; color: var(--nl-text); }
    .sc-main { padding: 28px 0 96px; min-width: 0; }

    /* Sections */
    .sc-section { padding: 40px 0; border-top: 1px solid var(--line-soft); }
    .sc-section:first-child { border-top: 0; }
    .sc-section > .sc-kicker { font: 600 .7rem/1 var(--nl-font-body); letter-spacing: var(--nl-tracking-ui); text-transform: uppercase; color: var(--nl-primary); margin-bottom: 10px; }
    .sc-section > h2 { margin: 0 0 8px; font-size: clamp(1.6rem, 3vw, 2.2rem); letter-spacing: var(--nl-tracking-tight); }
    .sc-section > p.sc-intro { margin: 0 0 24px; max-width: 64ch; color: var(--fg-2); font-size: 1.02rem; line-height: 1.55; }
    h3.sc-sub { margin: 34px 0 14px; font-size: 1.15rem; letter-spacing: var(--nl-tracking-tight); }

    /* Demo block */
    .sc-demo { border: 1px solid var(--line-soft); border-radius: var(--nl-radius-card); background: var(--nl-white); overflow: hidden; box-shadow: var(--nl-shadow-card); margin-bottom: 22px; }
    .sc-demo-stage { padding: 30px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
    .sc-demo-stage.sc-block { display: block; }
    .sc-demo-stage.sc-tint { background: linear-gradient(180deg, #f7f7f4, #fff); }
    .sc-demo-bar { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-top: 1px solid var(--line-soft); background: #fafafa; }
    .sc-demo-bar .sc-name { font: 600 .82rem/1 var(--nl-font-body); color: var(--fg-3); }
    .sc-demo-bar .sc-spacer { flex: 1; }
    .sc-btn-mini { font: 600 .76rem/1 var(--nl-font-body); color: var(--fg-2); background: var(--nl-white); border: 1px solid var(--line-ui); border-radius: 8px; padding: 6px 11px; cursor: pointer; transition: all var(--nl-dur-ui) var(--nl-ease); }
    .sc-btn-mini:hover { border-color: var(--nl-primary); color: var(--nl-primary); }
    .sc-code { margin: 0; padding: 18px 20px; background: var(--nl-code-bg); color: #e2e8f0; font-family: var(--nl-font-mono); font-size: .82rem; line-height: 1.6; overflow-x: auto; }
    .sc-code .tok-tag { color: #7dd3fc; } .sc-code .tok-attr { color: #c4b5fd; } .sc-code .tok-str { color: #86efac; } .sc-code .tok-cmt { color: #64748b; }

    /* Token grids */
    .sc-grid { display: grid; gap: 14px; }
    .sc-swatches { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .sc-swatch { border: 1px solid var(--line-soft); border-radius: 14px; overflow: hidden; background: var(--nl-white); }
    .sc-swatch .chip { height: 72px; }
    .sc-swatch .meta { padding: 10px 12px; }
    .sc-swatch .meta b { display: block; font: 600 .82rem/1.3 var(--nl-font-body); }
    .sc-swatch .meta span { font-family: var(--nl-font-mono); font-size: .72rem; color: var(--fg-3); }
    .sc-grads { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .sc-grad { height: 96px; border-radius: 16px; display: flex; align-items: flex-end; padding: 12px; color: #fff; font: 600 .76rem/1 var(--nl-font-mono); text-shadow: 0 1px 4px rgba(0,0,0,.35); }

    /* Hero — estilo nlace.com: imagen full, scrim oscuro y contenido a la derecha */
    .sc-hero { position: relative; overflow: hidden; min-height: 100vh; display: flex; align-items: center; background-size: cover; background-position: center; }
    .sc-hero::after { content: ""; position: absolute; inset: 0; background:
      linear-gradient(100deg, rgba(15,16,30,0) 0%, rgba(70,18,28,.30) 42%, rgba(45,12,20,.74) 100%),
      linear-gradient(180deg, rgba(15,16,30,.32) 0%, transparent 24%); }
    .sc-hero-inner { position: relative; z-index: 2; width: 100%; max-width: var(--sc-max); margin: 0 auto; padding: 0 clamp(24px, 5vw, 56px); }
    .sc-hero-content { max-width: 660px; margin-left: auto; }
    .sc-hero-content h1 { color: #fff; font-size: clamp(2.6rem, 6vw, 5rem); line-height: 1; letter-spacing: -.045em; margin: 0 0 22px; }
    .sc-hero-content p { color: rgba(255,255,255,.92); font-size: clamp(1.05rem, 1.7vw, 1.3rem); line-height: 1.5; max-width: 50ch; margin: 0 0 32px; }
    .sc-hero-cta-panel {
      background: linear-gradient(135deg, rgba(60,20,30,.30), rgba(30,12,20,.42));
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.16); border-radius: 22px;
      padding: 20px; max-width: 380px;
    }
    .sc-hero-cta-panel .lbl { display: block; color: rgba(255,255,255,.86); font: 500 .98rem/1.3 var(--nl-font-body); margin-bottom: 12px; }
    .sc-hero-cta-btn {
      display: flex; align-items: center; justify-content: space-between; gap: 14px; width: 100%;
      font: 700 1rem/1 var(--nl-font-body); color: #fff; background: var(--nl-grad-warm);
      border: 0; border-radius: 9999px; padding: 13px 13px 13px 22px; cursor: pointer;
      box-shadow: 0 8px 22px rgba(252,98,75,.4);
      transition: transform var(--nl-dur-ui) var(--nl-ease);
    }
    .sc-hero-cta-btn:hover { text-decoration: none; transform: translateY(-1px); color: #fff; }
    .sc-hero-cta-btn .arrow { flex: none; display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.24); font-size: 1.1rem; }

    /* Callout / steps */
    .sc-steps { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .sc-step { border: 1px solid var(--line-soft); border-radius: 16px; background: var(--nl-white); padding: 20px; }
    .sc-step .n { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; background: var(--nl-primary-10); color: var(--nl-primary); font: 700 .9rem/1 var(--nl-font-body); margin-bottom: 12px; }
    .sc-step h4 { margin: 0 0 6px; font-size: 1rem; }
    .sc-step p { margin: 0; color: var(--fg-2); font-size: .92rem; line-height: 1.5; }
    .sc-step code { font-size: .82rem; background: var(--nl-primary-10); color: var(--nl-primary-dark); padding: 2px 6px; border-radius: 6px; }

    .sc-pre { margin: 0; padding: 18px 20px; background: var(--nl-code-bg); color: #e2e8f0; border-radius: 16px; font-family: var(--nl-font-mono); font-size: .84rem; line-height: 1.65; overflow-x: auto; }
    .sc-pre .c { color: #64748b; } .sc-pre .k { color: #c4b5fd; } .sc-pre .s { color: #86efac; }

    /* Imagery */
    .sc-imagery { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
    .sc-imagery img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 12px; display: block; border: 1px solid var(--line-soft); background: var(--nl-surface); transition: transform var(--nl-dur-ui) var(--nl-ease); }
    .sc-imagery img:hover { transform: scale(1.02); }
    .sc-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .sc-photos img { width: 100%; aspect-ratio: 4 / 5; object-fit: cover; border-radius: 12px; display: block; border: 1px solid var(--line-soft); background: var(--nl-surface); }

    /* Redes sociales */
    .sc-social { display: flex; flex-wrap: wrap; gap: 22px; align-items: flex-start; }

    footer.sc-footer { border-top: 1px solid var(--line-soft); padding: 40px 24px; text-align: center; color: var(--fg-3); font-size: .9rem; }

    @media (max-width: 880px) {
      .sc-shell { grid-template-columns: 1fr; }
      .sc-nav { display: none; }
      .sc-topbar a.sc-link { display: none; }
      .sc-hero-content { margin: 0; }
    }
    .sc-loading { max-width: var(--sc-max); margin: 80px auto; text-align: center; color: var(--fg-3); font-family: var(--nl-font-body); }
  </style>
</head>
<body>
  <div id="root"><div class="sc-loading">Cargando el NLACE Design System…</div></div>
  <script src="./assets/app.js"></script>
</body>
</html>
