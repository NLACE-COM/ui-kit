<svg width="760" height="120" viewBox="0 0 760 120" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <!-- bg -->
  <rect x="0" y="0" width="88" height="88" rx="14" fill="#efefef" stroke="#d4d4d8" stroke-width="1"/>
  <text x="44" y="108" text-anchor="middle" font-size="11" fill="#71717a">bg</text>
  <text x="44" y="120" text-anchor="middle" font-size="10" fill="#a1a1aa">#efefef</text>
  <!-- text -->
  <rect x="100" y="0" width="88" height="88" rx="14" fill="#141414"/>
  <text x="144" y="108" text-anchor="middle" font-size="11" fill="#71717a">text</text>
  <text x="144" y="120" text-anchor="middle" font-size="10" fill="#a1a1aa">#141414</text>
  <!-- primary -->
  <rect x="200" y="0" width="88" height="88" rx="14" fill="#3f58ea"/>
  <text x="244" y="108" text-anchor="middle" font-size="11" fill="#71717a">primary</text>
  <text x="244" y="120" text-anchor="middle" font-size="10" fill="#a1a1aa">#3f58ea</text>
  <!-- primary dark -->
  <rect x="300" y="0" width="88" height="88" rx="14" fill="#2f2f81"/>
  <text x="344" y="108" text-anchor="middle" font-size="11" fill="#71717a">primary-dark</text>
  <text x="344" y="120" text-anchor="middle" font-size="10" fill="#a1a1aa">#2f2f81</text>
  <!-- accent -->
  <rect x="400" y="0" width="88" height="88" rx="14" fill="#ff6143"/>
  <text x="444" y="108" text-anchor="middle" font-size="11" fill="#71717a">accent</text>
  <text x="444" y="120" text-anchor="middle" font-size="10" fill="#a1a1aa">#ff6143</text>
  <!-- success -->
  <rect x="500" y="0" width="88" height="88" rx="14" fill="#6be8b0"/>
  <text x="544" y="108" text-anchor="middle" font-size="11" fill="#71717a">success</text>
  <text x="544" y="120" text-anchor="middle" font-size="10" fill="#a1a1aa">#6be8b0</text>
  <!-- danger -->
  <rect x="600" y="0" width="88" height="88" rx="14" fill="#dc2626"/>
  <text x="644" y="108" text-anchor="middle" font-size="11" fill="#71717a">danger</text>
  <text x="644" y="120" text-anchor="middle" font-size="10" fill="#a1a1aa">#dc2626</text>
  <!-- 900 -->
  <rect x="700" y="0" width="60" height="88" rx="14" fill="#18181b"/>
  <text x="730" y="108" text-anchor="middle" font-size="11" fill="#71717a">900</text>
  <text x="730" y="120" text-anchor="middle" font-size="10" fill="#a1a1aa">#18181b</text>
</svg>
