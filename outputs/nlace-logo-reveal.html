<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1011; }
  </style>
</head>
<body>
  <div data-composition-id="nlace-logo-reveal" data-width="1920" data-height="1080">

    <style>
      [data-composition-id="nlace-logo-reveal"] {
        width: 1920px;
        height: 1080px;
        background: #0f1011;
        overflow: hidden;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Ambient radial glow behind everything */
      .bg-glow {
        position: absolute;
        width: 900px;
        height: 400px;
        background: radial-gradient(ellipse, rgba(88,105,247,0.08) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        pointer-events: none;
        z-index: 1;
      }

      /* The expanding bloom orb */
      .bloom-orb {
        position: absolute;
        width: 700px;
        height: 280px;
        background: radial-gradient(
          ellipse,
          rgba(88,105,247,0.55) 0%,
          rgba(88,105,247,0.18) 35%,
          rgba(247,109,238,0.08) 60%,
          transparent 75%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.1);
        border-radius: 50%;
        pointer-events: none;
        filter: blur(28px);
        opacity: 0;
        z-index: 2;
      }

      /* Full-screen white flash at bloom peak */
      .bloom-flash {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.55) 0%, transparent 65%);
        opacity: 0;
        pointer-events: none;
        z-index: 8;
      }

      /* Thin horizontal scan line that sweeps pre-bloom */
      .scan-line {
        position: absolute;
        width: 740px;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(88,105,247,0.6) 20%, rgba(255,255,255,0.9) 50%, rgba(88,105,247,0.6) 80%, transparent);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0;
        pointer-events: none;
        z-index: 9;
      }

      /* Logo container */
      .logo-wrapper {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-svg {
        width: 700px;
        height: auto;
        display: block;
      }

      /* All letter groups start invisible */
      #lg-n, #lg-l, #lg-a, #lg-c, #lg-e, #lg-dot {
        opacity: 0;
      }
    </style>

    <!-- Ambient glow layer -->
    <div class="bg-glow"></div>

    <!-- Bloom orb (grows on final beat) -->
    <div class="bloom-orb"></div>

    <!-- Scan line accent -->
    <div class="scan-line"></div>

    <!-- Flash at bloom peak -->
    <div class="bloom-flash"></div>

    <!-- NLACE Logo: each letter in its own <g> for independent animation -->
    <div class="logo-wrapper">
      <svg class="logo-svg" viewBox="0 0 464 125" xmlns="http://www.w3.org/2000/svg">
        <g id="lg-n">
          <path d="M0 123.169V34.454H28.965L30.297 52.43l-6.326 2a24.309 24.309 0 0 1 6.492-11.152 34.6 34.6 0 0 1 11.487-7.825 35.391 35.391 0 0 1 13.983-2.83c6.659 0 12.263 1.387 16.813 4.161a24.663 24.663 0 0 1 10.488 12.15c3.553 7.99 4.434 14.537 4.434 26.188v54.594H55.933v-52.1a16.819 16.819 0 0 0-1.332-7.157 9.327 9.327 0 0 0-4-4.494 11.593 11.593 0 0 0-6.326-1.332 16.741 16.741 0 0 0-5.327.832 11.132 11.132 0 0 0-4.162 2.663 11.85 11.85 0 0 0-2.83 3.828 13.35 13.35 0 0 0-.832 4.827v52.929H0Z" fill="#ffffff"/>
        </g>
        <g id="lg-l">
          <path d="M103.929 123.169V0h30.964v123.169h-30.964Z" fill="#ffffff"/>
        </g>
        <g id="lg-a">
          <path d="M183.894 124.667a35.164 35.164 0 0 1-19.81-5.825 42.478 42.478 0 0 1-13.817-16.312 54.7 54.7 0 0 1-4.994-23.8c0-9.099 1.665-17.088 4.994-23.968a39.437 39.437 0 0 1 13.817-16.145 35.285 35.285 0 0 1 20.309-5.992 36.708 36.708 0 0 1 11.32 1.664 26.914 26.914 0 0 1 8.989 4.827 36.936 36.936 0 0 1 6.659 7.157 40.531 40.531 0 0 1 4.661 8.655l-6.325-.333V34.454H240.16v88.715H209.031V101.531l6.825.333a33.93 33.93 0 0 1-11.486 16.312 37.088 37.088 0 0 1-9.323 4.824 35.157 35.157 0 0 1-11.153 1.667Zm8.823-25.466a17.28 17.28 0 0 0 9.156-2.33 15.625 15.625 0 0 0 5.826-7.157 25.864 25.864 0 0 0 2.164-10.985 26.3 26.3 0 0 0-2.164-11.152 14.636 14.636 0 0 0-5.826-6.991 18.037 18.037 0 0 0-18.312 0 14.975 14.975 0 0 0-5.66 6.991 28.2 28.2 0 0 0-2 11.152 27.732 27.732 0 0 0 2 10.985 16.031 16.031 0 0 0 5.66 7.157 17.277 17.277 0 0 0 9.156 2.33Z" fill="#ffffff"/>
        </g>
        <g id="lg-c">
          <path d="M298.074 124.834a46.8 46.8 0 0 1-23.638-5.992 44.24 44.24 0 0 1-16.314-16.312 47.109 47.109 0 0 1-5.993-23.8 46.2 46.2 0 0 1 5.993-23.635 43.875 43.875 0 0 1 16.314-16.478 46.79 46.79 0 0 1 23.638-5.992 60.923 60.923 0 0 1 21.974 3.828A38.016 38.016 0 0 1 336.2 47.437L319.382 67.41a18.918 18.918 0 0 0-4.661-4.161 20.772 20.772 0 0 0-6.326-3 22.581 22.581 0 0 0-7.491-1.165 18.4 18.4 0 0 0-9.655 2.5 17.182 17.182 0 0 0-6.492 6.991 22.041 22.041 0 0 0-2.164 9.987 22.041 22.041 0 0 0 2.164 9.987 17.423 17.423 0 0 0 6.326 6.991A18.357 18.357 0 0 0 300.9 98.2a26.04 26.04 0 0 0 7.491-1 20.933 20.933 0 0 0 6.16-2.829 20.131 20.131 0 0 0 4.827-4.328L336.2 110.186A40.092 40.092 0 0 1 319.882 121 60.448 60.448 0 0 1 298.074 124.834Z" fill="#ffffff"/>
        </g>
        <g id="lg-e">
          <path d="M387.768 124.834c-10.099 0-18.811-1.998-26.135-5.826a42.936 42.936 0 0 1-16.98-16.312 47.106 47.106 0 0 1-5.993-23.8 50.173 50.173 0 0 1 3.329-18.475 43.522 43.522 0 0 1 9.322-14.647 40.178 40.178 0 0 1 14.15-9.654 46.4 46.4 0 0 1 18.145-3.5 44.22 44.22 0 0 1 17.479 3.329 38.271 38.271 0 0 1 13.651 9.487 41.031 41.031 0 0 1 8.823 14.481 46.7 46.7 0 0 1 2.83 18.309l-.167 6.991H356.306l-3.829-15.489h48.941l-3 3.329v-3.162a10.241 10.241 0 0 0-2-6.325 11.85 11.85 0 0 0-4.994-4.328 16.521 16.521 0 0 0-7.158-1.5 17.954 17.954 0 0 0-9.489 2.33 14.314 14.314 0 0 0-5.659 6.325 22.894 22.894 0 0 0-2 9.987 23.429 23.429 0 0 0 2.663 11.485 19.088 19.088 0 0 0 8.157 7.49 30.321 30.321 0 0 0 13.318 2.663 27.386 27.386 0 0 0 8.989-1.332 31.062 31.062 0 0 0 8.49-4.66l14.316 20.14a60.03 60.03 0 0 1-11.819 7.49 58.981 58.981 0 0 1-23.472 5.16Z" fill="#ffffff"/>
        </g>
        <g id="lg-dot">
          <path d="M448.352 125c-4.994 0-8.878-1.387-11.653-4.161-2.663-2.774-3.995-6.713-3.995-11.818a15.879 15.879 0 0 1 4.328-11.484 15.006 15.006 0 0 1 11.32-4.494c4.883 0 8.712 1.387 11.486 4.161S464 104.917 464 109.021a15.878 15.878 0 0 1-4.328 11.485A15.006 15.006 0 0 1 448.352 125Z" fill="#5869f7"/>
        </g>
      </svg>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });

      // ─── Ambient bg glow: slow breathe throughout ───────────────────
      tl.to(".bg-glow", {
        scale: 1.4,
        opacity: 0.9,
        duration: 3,
        ease: "sine.inOut"
      }, 0);

      // ─── Letra N ─────────────────────────────────────────────────────
      tl.fromTo("#lg-n",
        { opacity: 0, y: 22, filter: "blur(7px)" },
        { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.55, ease: "power3.out" },
        0.35
      );

      // ─── Letra L ─────────────────────────────────────────────────────
      tl.fromTo("#lg-l",
        { opacity: 0, y: 22, filter: "blur(7px)" },
        { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.5, ease: "expo.out" },
        0.65
      );

      // ─── Letra A ─────────────────────────────────────────────────────
      tl.fromTo("#lg-a",
        { opacity: 0, y: 22, filter: "blur(7px)" },
        { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.55, ease: "power4.out" },
        0.95
      );

      // ─── Letra C ─────────────────────────────────────────────────────
      tl.fromTo("#lg-c",
        { opacity: 0, y: 22, filter: "blur(7px)" },
        { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.5, ease: "expo.out" },
        1.25
      );

      // ─── Letra E ─────────────────────────────────────────────────────
      tl.fromTo("#lg-e",
        { opacity: 0, y: 22, filter: "blur(7px)" },
        { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.55, ease: "power3.out" },
        1.55
      );

      // ─── Punto (acento azul, pop con scale) ───────────────────────
      tl.fromTo("#lg-dot",
        { opacity: 0, scale: 0, filter: "blur(4px)", transformOrigin: "center center" },
        { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.45, ease: "back.out(2.2)" },
        1.9
      );

      // ─── Scan line sweep (post-letras, pre-bloom) ─────────────────
      tl.fromTo(".scan-line",
        { opacity: 0, scaleX: 0 },
        { opacity: 1, scaleX: 1, duration: 0.4, ease: "power2.out" },
        2.3
      );
      tl.to(".scan-line", {
        opacity: 0,
        duration: 0.35,
        ease: "power2.in"
      }, 2.8);

      // ─── Bloom: orb se expande ────────────────────────────────────
      tl.to(".bloom-orb", {
        opacity: 1,
        scale: 3.2,
        duration: 1.4,
        ease: "power2.out"
      }, 2.5);

      // ─── Logo glow se construye progresivamente ───────────────────
      tl.to(".logo-wrapper", {
        filter: "drop-shadow(0 0 18px rgba(88,105,247,0.55)) drop-shadow(0 0 55px rgba(88,105,247,0.25))",
        duration: 1.0,
        ease: "power2.out"
      }, 2.5);

      // ─── PEAK: flash blanco + glow máximo ────────────────────────
      tl.to(".bloom-flash", {
        opacity: 1,
        duration: 0.22,
        ease: "power4.out"
      }, 3.6);
      tl.to(".bloom-flash", {
        opacity: 0,
        duration: 0.7,
        ease: "power2.inOut"
      }, 3.82);

      tl.to(".logo-wrapper", {
        filter: "drop-shadow(0 0 35px rgba(88,105,247,1)) drop-shadow(0 0 90px rgba(88,105,247,0.65)) drop-shadow(0 0 180px rgba(247,109,238,0.35))",
        duration: 0.22,
        ease: "power4.out"
      }, 3.6);

      // ─── Settle: glow se asienta, cálido y estable ───────────────
      tl.to(".logo-wrapper", {
        filter: "drop-shadow(0 0 22px rgba(88,105,247,0.75)) drop-shadow(0 0 65px rgba(88,105,247,0.3))",
        duration: 1.1,
        ease: "power2.inOut"
      }, 4.1);

      tl.to(".bloom-orb", {
        opacity: 0.38,
        scale: 3.8,
        duration: 1.2,
        ease: "power1.inOut"
      }, 4.0);

      // ─── Hold final ───────────────────────────────────────────────
      // Composición dura 6 s; el último keyframe llega a ~5.2 s

      window.__timelines["nlace-logo-reveal"] = tl;
    </script>
  </div>
</body>
</html>
