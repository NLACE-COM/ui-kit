<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Reel NLACE" description="Reel animado 9:16 (1080×1920) en loop — promo de artículo con revelado secuenciado, temas claro/oscuro/gradiente." -->
<helmet>
<script src="./ds-base.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;}
  @keyframes nlProgress { 0%{width:0} 100%{width:100%} }
  @keyframes nlWord   { 0%,2%{opacity:0;transform:translateY(26px)} 8%,100%{opacity:1;transform:translateY(0)} }
  @keyframes nlEyebrow{ 0%,8%{opacity:0;transform:translateX(-22px)} 13%,100%{opacity:1;transform:translateX(0)} }
  @keyframes nlLine1  { 0%,11%{opacity:0;transform:translateY(40px)} 18%,100%{opacity:1;transform:translateY(0)} }
  @keyframes nlLine2  { 0%,13%{opacity:0;transform:translateY(40px)} 20%,100%{opacity:1;transform:translateY(0)} }
  @keyframes nlSub    { 0%,26%{opacity:0;transform:translateY(20px)} 32%,100%{opacity:1;transform:translateY(0)} }
  @keyframes nlCard   { 0%,30%{opacity:0;transform:translateY(40px) scale(.97)} 38%,100%{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes nlFooter { 0%,39%{opacity:0;transform:translateY(22px) scale(.96)} 44%{transform:translateY(0) scale(1.03)} 47%,100%{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes nlKen    { 0%{transform:scale(1)} 100%{transform:scale(1.09)} }
  @keyframes nlFloat  { 0%,100%{transform:translateY(-6px)} 50%{transform:translateY(6px)} }
  @keyframes nlRing   { 0%{transform:scale(1);opacity:.55} 70%{opacity:0} 100%{transform:scale(1.9);opacity:0} }
  @media (prefers-reduced-motion: reduce){
    .nl-anim{ animation:none !important; opacity:1 !important; transform:none !important; }
    .nl-prog{ animation:none !important; width:100% !important; }
  }
</style>
</helmet>

<div ref="{{ setHost }}" style="width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#c6c7c2;padding:24px;font-family:Inter,sans-serif;">
  <div style="width:var(--sw,324px);height:var(--sh,576px);flex:none;">
    <div style="width:1080px;height:1920px;transform:scale(var(--sc,.3));transform-origin:top left;position:relative;overflow:hidden;background:var(--bg,linear-gradient(157deg,#1a1a5e 0%,#2535a8 55%,#2d3bc4 100%));">

      <!-- progress bar -->
      <div style="position:absolute;top:48px;left:96px;right:96px;height:7px;border-radius:9999px;background:var(--track,rgba(255,255,255,.16));overflow:hidden;z-index:5;">
        <div class="nl-prog" style="height:100%;border-radius:9999px;background:var(--accent,#fc624b);animation:nlProgress 9s linear infinite;"></div>
      </div>

      <div style="position:absolute;inset:96px;top:108px;display:flex;flex-direction:column;z-index:2;">
        <img src="{{ wordmarkSrc }}" alt="NLACE" class="nl-anim" style="height:52px;align-self:flex-start;animation:nlWord 9s cubic-bezier(0.22,1,0.36,1) infinite;">

        <div style="flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:30px;">
          <div class="nl-anim" style="display:flex;align-items:center;gap:16px;animation:nlEyebrow 9s cubic-bezier(0.22,1,0.36,1) infinite;">
            <span style="width:18px;height:18px;border-radius:3px;background:var(--accent,#fc624b);"></span>
            <span style="font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:28px;color:var(--fg,#fff);">Nuevo artículo</span>
          </div>

          <h1 style="font-family:'Space Grotesk';font-weight:700;letter-spacing:-.03em;line-height:1.06;font-size:108px;color:var(--fg,#fff);margin:0;">
            <span class="nl-anim" style="display:block;animation:nlLine1 9s cubic-bezier(0.22,1,0.36,1) infinite;">Cómo construimos</span>
            <span class="nl-anim" style="display:block;animation:nlLine2 9s cubic-bezier(0.22,1,0.36,1) infinite;">productos memorables</span>
          </h1>

          <p class="nl-anim" style="font-weight:400;line-height:1.4;font-size:38px;color:var(--sub,rgba(255,255,255,.78));margin:0;max-width:16em;animation:nlSub 9s cubic-bezier(0.22,1,0.36,1) infinite;">Tres principios que guían cada decisión de producto en NLACE.</p>

          <div class="nl-anim" style="margin-top:14px;border-radius:28px;overflow:hidden;box-shadow:var(--cardShadow,0 30px 70px rgba(15,16,40,.42));animation:nlCard 9s cubic-bezier(0.22,1,0.36,1) infinite;">
            <div style="animation:nlFloat 6s ease-in-out infinite;">
              <div style="height:640px;background:#15151c;overflow:hidden;">
                <div style="width:100%;height:100%;background:#15151c url('../../assets/photos/team-meeting-02.jpg') center/cover;animation:nlKen 6s ease-in-out infinite alternate;"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="nl-anim" style="display:flex;align-items:center;justify-content:space-between;gap:24px;animation:nlFooter 9s cubic-bezier(0.34,1.56,0.64,1) infinite;">
          <div style="font-size:32px;color:var(--sub,rgba(255,255,255,.78));"><span style="font-weight:600;color:var(--fg,#fff);">Por equipo NLACE</span> · 6 min de lectura</div>
          <div style="position:relative;display:inline-flex;">
            <span style="position:absolute;inset:0;border-radius:9999px;background:var(--accent,#fc624b);animation:nlRing 1.7s ease-out 4.2s infinite;"></span>
            <div style="position:relative;display:inline-flex;align-items:center;gap:12px;background:var(--accent,#fc624b);color:var(--ctaInk,#fff);border-radius:9999px;padding:.6em 1.2em;font-weight:600;font-size:32px;white-space:nowrap;">Lee el artículo <svg width="1.05em" height="1.05em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;gradiente&quot;,&quot;azul&quot;,&quot;claro&quot;],&quot;default&quot;:&quot;gradiente&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;coral&quot;,&quot;azul&quot;,&quot;magenta&quot;,&quot;verde&quot;],&quot;default&quot;:&quot;coral&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { scale: 0.3 };

  componentDidMount() {
    this.fit();
    this.applyVars();
    this._ro = new ResizeObserver(() => this.fit());
    if (this.hostEl) this._ro.observe(this.hostEl);
    this._onR = () => this.fit();
    window.addEventListener('resize', this._onR);
  }
  componentWillUnmount() {
    if (this._ro) this._ro.disconnect();
    window.removeEventListener('resize', this._onR);
  }

  componentDidUpdate() { this.applyVars(); }
  applyVars() {
    const el = this.hostEl; if (!el) return;
    const v = this.computeVars();
    for (const k in v) el.style.setProperty(k, v[k]);
  }
  computeVars() {
    const theme = this.props.theme || 'gradiente';
    const accentMap = { coral: '#fc624b', azul: '#5869f7', magenta: '#b717af', verde: '#42cf8a' };
    const accent = accentMap[this.props.accent] || '#fc624b';
    const themes = {
      claro:     { bg: '#efefef', fg: '#0f1011', sub: '#51515a', dark: false, cardShadow: '0 2px 14px rgba(20,20,20,.12)' },
      azul:      { bg: '#5869f7', fg: '#ffffff', sub: 'rgba(255,255,255,.78)', dark: true, cardShadow: '0 30px 70px rgba(20,24,80,.40)' },
      gradiente: { bg: 'linear-gradient(157deg,#1a1a5e 0%,#2535a8 55%,#2d3bc4 100%)', fg: '#ffffff', sub: 'rgba(255,255,255,.78)', dark: true, cardShadow: '0 30px 70px rgba(15,16,40,.42)' },
    };
    const t = themes[theme] || themes.gradiente;
    const sc = this.state.scale;
    return {
      '--sc': sc, '--sw': Math.round(1080*sc)+'px', '--sh': Math.round(1920*sc)+'px',
      '--bg': t.bg, '--fg': t.fg, '--sub': t.sub, '--accent': accent,
      '--track': t.dark ? 'rgba(255,255,255,.16)' : 'rgba(15,16,17,.12)',
      '--cardShadow': t.cardShadow, '--ctaInk': this.ink(accent),
    };
  }

  setHost = (el) => {
    this.hostEl = el;
    if (el && this._ro) this._ro.observe(el);
    if (el) this.fit();
    if (el) this.applyVars();
  };

  fit() {
    const el = this.hostEl;
    if (!el) return;
    const W = 1080, H = 1920;
    const aw = el.clientWidth - 48;
    const ah = el.clientHeight - 48;
    if (aw <= 0 || ah <= 0) return;
    const s = Math.min(aw / W, ah / H);
    if (Math.abs(s - this.state.scale) > 0.002) this.setState({ scale: s });
  }

  lum(hex) {
    const m = hex.replace('#', '');
    const r = parseInt(m.slice(0, 2), 16), g = parseInt(m.slice(2, 4), 16), b = parseInt(m.slice(4, 6), 16);
    return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  }
  ink(hex) { return this.lum(hex) > 0.62 ? '#0f1011' : '#ffffff'; }

  renderVals() {
    const theme = this.props.theme || 'gradiente';
    const accentMap = { coral: '#fc624b', azul: '#5869f7', magenta: '#b717af', verde: '#42cf8a' };
    const accent = accentMap[this.props.accent] || '#fc624b';

    // Sin fondos negros: el tema oscuro es el azul de marca o el degradado índigo del sistema.
    const themes = {
      claro:     { bg: '#efefef', fg: '#0f1011', sub: '#51515a', dark: false, cardShadow: '0 2px 14px rgba(20,20,20,.12)' },
      azul:      { bg: '#5869f7', fg: '#ffffff', sub: 'rgba(255,255,255,.78)', dark: true, cardShadow: '0 30px 70px rgba(20,24,80,.40)' },
      gradiente: { bg: 'linear-gradient(157deg,#1a1a5e 0%,#2535a8 55%,#2d3bc4 100%)', fg: '#ffffff', sub: 'rgba(255,255,255,.78)', dark: true, cardShadow: '0 30px 70px rgba(15,16,40,.42)' },
    };
    const t = themes[theme] || themes.gradiente;

    return {
      scale: this.state.scale,
      sw: Math.round(1080 * this.state.scale),
      sh: Math.round(1920 * this.state.scale),
      setHost: this.setHost,
      bg: t.bg, fg: t.fg, sub: t.sub, accent,
      track: t.dark ? 'rgba(255,255,255,.16)' : 'rgba(15,16,17,.12)',
      cardShadow: t.cardShadow,
      wordmarkSrc: t.dark ? '../../assets/nlace-white.svg' : '../../assets/nlace-black.svg',
      ctaInk: this.ink(accent),
    };
  }
}
</script>
</body>
</html>
